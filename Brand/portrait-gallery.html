<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello AI Lab Portrait Gallery</title>
    <style>
      body { margin:0; background:#040811; color:#f5f7fb; font-family:Inter, Segoe UI, sans-serif; padding:24px; }
      .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:18px; }
      .card { background:linear-gradient(145deg,#0d1420,#070b11); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:14px; }
      img { width:100%; height:auto; display:block; border-radius:14px; background:#0a1118; }
      h2 { margin:0 0 20px; }
      .name { margin-top:10px; font-weight:700; }
    </style>
  </head>
  <body>
    <h2>Hello AI Lab Portrait Gallery</h2>
    <div class="grid">
      <div class="card"><img src="Assets/portraits/chappy.svg" /><div class="name">CEO CHAPPY</div></div>
      <div class="card"><img src="Assets/portraits/atlas.svg" /><div class="name">Atlas</div></div>
      <div class="card"><img src="Assets/portraits/noah.svg" /><div class="name">Noah</div></div>
      <div class="card"><img src="Assets/portraits/luna.svg" /><div class="name">Luna</div></div>
      <div class="card"><img src="Assets/portraits/nova.svg" /><div class="name">Nova</div></div>
      <div class="card"><img src="Assets/portraits/kai.svg" /><div class="name">Kai</div></div>
      <div class="card"><img src="Assets/portraits/echo.svg" /><div class="name">Echo</div></div>
      <div class="card"><img src="Assets/portraits/orion.svg" /><div class="name">Orion</div></div>
    </div>
  </body>
</html>
