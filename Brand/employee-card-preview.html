<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello AI Lab Employee Card Preview</title>
    <style>
      body {
        margin: 0;
        background: #040811;
        color: #f5f7fb;
        font-family: Inter, Segoe UI, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card-wrap {
        width: min(100%, 1080px);
        background: linear-gradient(145deg, #0c1420, #070b11);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 28px;
        padding: 20px;
        box-shadow: 0 20px 48px rgba(0,0,0,0.35);
      }
      img { width: 100%; height: auto; display: block; border-radius: 18px; }
    </style>
  </head>
  <body>
    <div class="card-wrap">
      <img src="Assets/employee-card-template.svg" alt="Hello AI Lab employee card template" />
    </div>
  </body>
</html>
